global:
  scrape_interval: 5s          # how often Prometheus scrapes targets
  evaluation_interval: 15s     # how often alerting rules are evaluated

scrape_configs:
  - job_name: "flask-auth-service"
    metrics_path: /metrics
    static_configs:
      - targets: ["app:5000"]   # 'app' = the Docker Compose service name
    scrape_interval: 5s

  # Prometheus also scrapes itself, useful for sanity-checking the setup
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]